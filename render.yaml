services:
  - type: web
    name: ogv-day-os
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SERVER_URL
        sync: false
      - key: PORT
        value: 3000
